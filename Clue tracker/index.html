<html>
  <head>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
      integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
      crossorigin="anonymous"
    />
    <script
      src="https://code.jquery.com/jquery-3.4.1.slim.min.js"
      integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
      integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"
      integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://runeapps.org/nis/nis.css"
    />
    <script src="https://www.unpkg.com/alt1/dist/base/index.js"></script>
    <script src="https://www.unpkg.com/alt1/dist/ocr/index.js"></script>
    <script src="https://www.unpkg.com/alt1/dist/chatbox/index.js"></script>
    <script src="buffreader.bundle.js"></script>

  </head>
  <style>

    /* General RuneScape 3 button style */
    button {
      font-family: "Verdana", sans-serif;
      font-weight: bold;
      padding: 4px 8px;
      margin: 4;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 110;
      height: 45;
    }

    /* Individual button colors */
    #startBtn {
      background: linear-gradient(#5cb85c, #4caf50);
      color: black;
    }

    #stopBtn {
      background: linear-gradient(#fdd835, #fbc02d);
      color: black;
    }

    #resetBtn {
      background: linear-gradient(#ff5c5c, #ff4444);
      color: black;
    }

    #saveBtn {
      background: linear-gradient(#42a5f5, #1e88e5);
      color: black;
    }    
  </style>


  <body class="nis">
    <!-- Pop ups fun -->
    
    <!-- Buttons -->
    <div>
      <button id="startBtn">Start Timer</button>
      <button id="stopBtn">Pause Timer</button>
      <button id="resetBtn">Reset</button>
    </div>

    <!-- CLOCK -->
    <div id="runtimeContainer" style="display:flex; align-items:center; justify-content:center; gap:8px; font-size:22px; font-weight:bold; margin-bottom:12px;">
      <img src="https://runescape.wiki/images/thumb/Advance_Time_icon.png/60px-Advance_Time_icon.png?eec8d" style="width:28px; height:28px;">
      <span id="timer">00:00:00.000</span>
    </div>

  <!-- CLUE TRACKER -->  
  <div style="background:rgba(30,30,30,0.8); padding:10px; border:2px solid #b18b29; border-radius:8px; color:#ffd98a; margin-bottom:15px;">
    <h3 style="margin:0 0 10px; color:#ffd98a;">
      <img src="images\clue_scroll.png" width="28" style="vertical-align:middle; margin-right:6px;">
      Clue Tracker
    </h3>

<table style="width:100%; border-collapse: collapse; text-align:center;">
  <thead>
    <tr style="border-bottom:2px solid #b18b29;">
      <th>Clue Type</th>
      <th>Total</th>
      <th><img src="images/scripture_of_Bik.png" width="28" style="vertical-align:middle; margin-right:6px;"></th>
      <th><img src="images/prosper_perk.png" width="28" style="vertical-align:middle; margin-right:6px;"></th>
      <th><img src="images/loot_beam.png" width="28" style="vertical-align:middle; margin-right:6px;"></th>
    </tr>
  </thead>
  <tbody>
    <!-- EASY -->
    <tr>
      <td><img class="npcIcon" src="images/easy_clue_scroll.png" width="24"></td>
      <td id="totalEasy">0</td>
      <td id="bikEasy">0</td>
      <td id="prosperEasy">0</td>
      <td id="lootEasy">0</td>
    </tr>
    <!-- MEDIUM -->
    <tr>
      <td><img class="npcIcon" src="images/medium_clue_scroll.png" width="24"></td>
      <td id="totalMedium">0</td>
      <td id="bikMedium">0</td>
      <td id="prosperMedium">0</td>
      <td id="lootMedium">0</td>
    </tr>
    <!-- HARD -->
    <tr>
      <td><img class="npcIcon" src="images/hard_clue_scroll.png" width="24"></td>
      <td id="totalHard">0</td>
      <td id="bikHard">0</td>
      <td id="prosperHard">0</td>
      <td id="lootHard">0</td>
    </tr>
    <!-- ELITE -->
    <tr>
      <td><img class="npcIcon" src="images/elite_clue_scroll.png" width="24"></td>
      <td id="totalElite">0</td>
      <td id="bikElite">0</td>
      <td id="prosperElite">0</td>
      <td id="lootElite">0</td>
    </tr>
    <!-- MASTER -->
    <tr>
      <td><img class="npcIcon" src="images/master_clue_scroll.png" width="24"></td>
      <td id="totalMaster">0</td>
      <td id="bikMaster">0</td>
      <td id="prosperMaster">0</td>
      <td id="lootMaster">0</td>
    </tr>
  </tbody>
</table>

<br>



<table id="bikMatrix" style="width:100%; border-collapse: collapse; text-align:center; margin-top:12px;">
      <h3 style="margin:0 0 10px; color:#ffd98a;">
      <img src="images/scripture_of_Bik.png" width="28" style="vertical-align:middle; margin-right:6px;">
      Bik Analytics
    </h3>

  <thead>
    <tr style="border-bottom:2px solid #b18b29;">
      <th>Tier</th>
      <th>1x</th>
      <th>2x</th>
      <th>3x</th>
    </tr>
  </thead>
  <tbody>
    <!-- Will be filled by JS -->
  </tbody>
</table>



<!-- SETTINGS -->
<div
  style="
    background:rgba(30,30,30,0.8);
    padding:10px;
    border:2px solid #b18b29;
    border-radius:8px;
    color:#ffd98a;
    margin-bottom:15px;
  "
>
  <h3 style="margin:0 0 10px; color:#ffd98a;">
    <img
      src="https://runescape.wiki/images/Options_icon.png?bfd51"
      width="28"
      style="vertical-align:middle; margin-right:6px;"
    />
    Settings
  </h3>

  <!-- Auto start -->
  <div style="display:flex; align-items:center; gap:10px; font-size:15px;">
    <input
      type="checkbox"
      id="autoStartCheckbox"
      style="transform:scale(1.3); cursor:pointer;"
    />
    <label
      for="autoStartCheckbox"
      style="cursor:pointer; color:#ffebc8;"
    >
      Auto start tracking
    </label>
  </div>

  <!-- Spirit attraction warn -->
  <div style="display:flex; align-items:center; gap:10px; font-size:15px;">
    <input
      type="checkbox"
      id="spiritCheckbox"
      style="transform:scale(1.3); cursor:pointer;"
    />
    <label
      for="spiritCheckbox"
      style="cursor:pointer; color:#ffebc8;"
    >
      Warn spirit attraction
    </label>
  </div>

  <!-- History buttons -->
  <div style="margin-top:10px; display:flex; gap:6px; flex-wrap:wrap;">
    <button id="showHistoryBtn">Show clue history</button>
    <button id="showBikHistoryBtn">Show Bik history</button>
  </div>

  <!-- Bik page purchase input -->
  <div style="margin-top:12px; font-size:14px;">
    <div style="margin-bottom:4px; color:#ffebc8;">
      Bik page purchases (1 page = 45 min active)
    </div>
    <div style="display:flex; flex-wrap:wrap; gap:6px; align-items:center;">
      <input
        type="number"
        id="bikPagesInput"
        min="1"
        placeholder="Pages"
        style="width:80px; padding:2px 4px; border-radius:4px; border:1px solid #555;"
      />
      <input
        type="text"
        id="bikPriceInput"
        placeholder="Total price (e.g. 45 784 124)"
        style="flex:1; min-width:150px; padding:2px 4px; border-radius:4px; border:1px solid #555;"
      />
      <button id="addBikPurchaseBtn">Add</button>
    </div>
  </div>
</div>
<!-- Bik analytics controls -->
<div style="width:100%; margin-top:12px; text-align:right; font-size:12px;">
  <span style="margin-right:6px;">Bik view:</span>
  <button id="bikModePercent"   style="padding:2px 6px; margin-right:2px;">%</button>
  <button id="bikModeCount"     style="padding:2px 6px; margin-right:2px;">Count</button>
  <button id="bikModeCluesHour" style="padding:2px 6px;">Clues/h</button>
</div>

<!-- Drop history modal (keep this OUTSIDE the settings card) -->
<div
  class="modal fade"
  id="historyModal"
  tabindex="-1"
  role="dialog"
  aria-hidden="true"
>
  <div class="modal-dialog modal-lg" role="document">
    <div
      class="modal-content"
      style="background:rgba(15,15,15,0.95); color:#ffd98a; border:2px solid #b18b29;"
    >
      <div class="modal-header">
        <h5 class="modal-title" id="historyModalTitle">Drop history</h5>
        <button
          type="button"
          class="close"
          data-dismiss="modal"
          aria-label="Close"
          style="width:auto; height:auto; padding:0; margin:0; background:none; border:none;"
        >
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <div class="modal-body" style="max-height:400px; overflow-y:auto;">
        <div id="historyContent"><!-- filled by JS --></div>
      </div>

      <div class="modal-footer" style="border-top:1px solid #b18b29;">
        <button type="button" data-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>


   
  </body>
  <script src="scripts/script.js"></script>
</html>
