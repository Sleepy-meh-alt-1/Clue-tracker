<html>
<head>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://runeapps.org/nis/nis.css">

  <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>

  <script src="https://www.unpkg.com/alt1/dist/base/index.js"></script>
  <script src="https://www.unpkg.com/alt1/dist/ocr/index.js"></script>
  <script src="https://www.unpkg.com/alt1/dist/chatbox/index.js"></script>

  <script src="buffreader.bundle.js"></script>
</head>

<style>
.btn-rs {
  font-family: Verdana, sans-serif;
  font-weight: bold;
  padding: 4px 8px;
  border-radius: 6px;
  cursor: pointer;
  border: none;
}

.btn-rs.green { background: linear-gradient(#5cb85c, #4caf50); }
.btn-rs.yellow { background: linear-gradient(#fdd835, #fbc02d); }
.btn-rs.red { background: linear-gradient(#ff5c5c, #ff4444); }

.btn-group-custom {
  display: flex;
  gap: 6px;
}

.timer {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 12px;
}

.timer img { width: 28px; }

.panel {
  background: rgba(30,30,30,0.8);
  padding: 10px;
  border: 2px solid #b18b29;
  border-radius: 8px;
  margin-bottom: 15px;
}

.panel-title {
  display: flex;
  align-items: center;
  gap: 6px;
  color: #ffd98a;
}

.table-custom,
.bik-table {
  width: 100%;
  border-collapse: collapse;
  text-align: center;
}

thead tr {
  border-bottom: 2px solid #b18b29;
}

.bik-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0 6px;
}

.bik-title {
  display: flex;
  align-items: center;
  gap: 6px;
  color: #ffd98a;
  font-weight: bold;
}

.segmented {
  display: inline-flex;
  background: #1a1a1a;
  border: 1px solid #3a3a3a;
  border-radius: 6px;
  overflow: hidden;
}

.segmented button {
  background: transparent;
  border: none;
  color: #aaa;
  padding: 1px 6px;
  font-size: 11px;
  cursor: pointer;
}

.segmented button.active {
  background: #b18b29;
  color: #000;
}

.setting {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 6px 0;
}

.btn-row {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}

.input-group-custom {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}
</style>

<body class="nis">

  <!-- TIMER CONTROLS -->
  <div class="btn-group-custom">
    <button id="startBtn" class="btn-rs green">Start Timer</button>
    <button id="stopBtn" class="btn-rs yellow">Pause Timer</button>
    <button id="resetBtn" class="btn-rs red">Reset</button>
  </div>

  <!-- CLOCK -->
  <div class="timer">
    <img src="https://runescape.wiki/images/thumb/Advance_Time_icon.png/60px-Advance_Time_icon.png">
    <span id="timer">00:00:00.000</span>
  </div>

  <!-- CLUE TRACKER -->
  <div class="panel">
    <h3 class="panel-title">
      <img src="images/clue_scroll.png">
      Clue Tracker
    </h3>

    <table class="table-custom">
      <thead>
        <tr>
          <th>Clue Type</th>
          <th>Total</th>
          <th><img src="images/scripture_of_Bik.png"></th>
          <th><img src="images/prosper_perk.png"></th>
          <th><img src="images/loot_beam.png"></th>
        </tr>
      </thead>
      <tbody>
        <!-- EASY --> 
        <tr> 
          <td><img class="npcIcon" src="images/easy_clue_scroll.png" width="24"></td> 
          <td id="totalEasy">0</td> 
          <td id="bikEasy">0</td> 
          <td id="prosperEasy">0</td> 
          <td id="lootEasy">0</td> 
        </tr> 
        <!-- MEDIUM --> 
        <tr> 
          <td><img class="npcIcon" src="images/medium_clue_scroll.png" width="24"></td>
          <td id="totalMedium">0</td>
          <td id="bikMedium">0</td> 
          <td id="prosperMedium">0</td> 
          <td id="lootMedium">0</td> 
        </tr> 
        <!-- HARD --> 
        <tr> 
          <td><img class="npcIcon" src="images/hard_clue_scroll.png" width="24"></td> 
          <td id="totalHard">0</td> 
          <td id="bikHard">0</td> 
          <td id="prosperHard">0</td> 
          <td id="lootHard">0</td> 
        </tr> 
        <!-- ELITE --> 
        <tr> 
          <td><img class="npcIcon" src="images/elite_clue_scroll.png" width="24"></td> 
          <td id="totalElite">0</td> 
          <td id="bikElite">0</td> 
          <td id="prosperElite">0</td> 
          <td id="lootElite">0</td> 
        </tr> 
        <!-- MASTER --> 
         <tr> <td><img class="npcIcon" src="images/master_clue_scroll.png" width="24"></td> 
          <td id="totalMaster">0</td> 
          <td id="bikMaster">0</td> 
          <td id="prosperMaster">0</td> 
          <td id="lootMaster">0</td> 
        </tr>      
      </tbody>
    </table>

    <!-- BIK HEADER -->
    <div class="bik-header">
      <div class="bik-title">
        <img src="images/scripture_of_Bik.png">
        <span>Bik Analytics</span>
      </div>

      <div id="bikModeGroup" class="segmented">
        <button data-mode="percent">%</button>
        <button data-mode="count">Count</button>
        <button data-mode="clues">Clues/h</button>
      </div>
    </div>

    <table id="bikMatrix" class="bik-table">
      <thead>
        <tr>
          <th>Tier</th>
          <th>1x</th>
          <th>2x</th>
          <th>3x</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- SETTINGS -->
  <div class="panel">
    <h3 class="panel-title">
      <img src="https://runescape.wiki/images/Options_icon.png?bfd51">
      Settings
    </h3>

    <label class="setting">
      <input type="checkbox" id="autoStartCheckbox">
      Auto start tracking
    </label>

    <label class="setting">
      <input type="checkbox" id="spiritCheckbox">
      Warn spirit attraction
    </label>

    <div class="btn-row">
      <button id="showHistoryBtn" class="btn-rs blue">Clue history</button>
      <button id="showBikHistoryBtn" class="btn-rs blue">Bik history</button>
    </div>

    <div class="input-group-custom">
      <input type="number" id="bikPagesInput" placeholder="# Pages">
      <input type="text" id="bikPriceInput" placeholder="Total price">
      <button id="addBikPurchaseBtn" class="btn-rs blue">Add</button>
    </div>
      <div id="bikPurchaseError" style="color:#ff6b6b; font-size:12px; margin-top:4px;"></div>

  </div>



  <div
    class="modal fade"
    id="historyModal"
    tabindex="-1"
    role="dialog"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-lg" role="document">
      <div
        class="modal-content"
        style="background:rgba(15,15,15,0.95); color:#ffd98a; border:2px solid #b18b29;"
      >
        <div class="modal-header">
          <h5 class="modal-title" id="historyModalTitle">Drop history</h5>
          <button
            type="button"
            class="close"
            data-dismiss="modal"
            aria-label="Close"
            style="width:auto; height:auto; padding:0; margin:0; background:none; border:none;"
          >
            <span aria-hidden="true">&times;</span>
          </button>
        </div>

        <div class="modal-body" style="max-height:400px; overflow-y:auto;">
          <div id="historyContent"></div>
        </div>

        <div class="modal-footer" style="border-top:1px solid #b18b29;">
          <button type="button" data-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="scripts/script.js"></script>
</body>
</html>
